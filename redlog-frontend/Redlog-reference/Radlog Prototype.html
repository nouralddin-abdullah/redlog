  {

  },
  {
    id: "c7",

  {

const NOTIFICATIONS_INIT = [
  { title: "تم الرد على سؤالك", body: "د. سامي حسن رد على سؤالك في درس أنواع الأشعة الطبية", time: "منذ 5 دقائق", read: false },
  { title: "فيديو جديد متاح", body: "تمت إضافة درس جديد في كورس تشخيص أمراض الصدر", time: "منذ ساعة", read: false },
  { title: "تذكير: اختبار قادم", body: "اختبار الوحدة الثالثة غداً الساعة 8 مساءً", time: "منذ 3 ساعات", read: false },
  { title: "إنجاز جديد!", body: "أكملت 50% من كورس تشخيص أمراض الصدر، استمر! 🎉", time: "أمس", read: true },
  { title: "رسالة جديدة في المجتمع", body: "5 رسائل جديدة في كورس MRI الأساسيات", time: "أمس", read: true },
];

const App = () => {
  const [authed, setAuthed] = useState(false);
  const [screen, setScreen] = useState("dashboard");
  const [activeCourse, setActiveCourse] = useState(null);
  const [notifications, setNotifications] = useState(NOTIFICATIONS_INIT);

  const navigate = (key) => {
    setScreen(key);
    if (key !== "player" && key !== "quiz") setActiveCourse(null);
  };

  const openCourse = (c) => {
    setActiveCourse(c);
    // Enrolled courses go straight to player; un-enrolled show the landing page
    setScreen(c.progress !== undefined ? "player" : "landing");
  };

  const enrollAndOpen = () => {
    if (activeCourse) {
      activeCourse.progress = 0;
      activeCourse.totalLessons = activeCourse.totalLessons || 28;
      activeCourse.completedLessons = 0;
      setScreen("player");
    }
  };

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)} />;
  }

  // Full-screen experiences (no shell)
  if (screen === "landing" && activeCourse) {
    return <CourseLandingScreen
      course={activeCourse}
      onBack={() => navigate("browse")}
      onEnroll={enrollAndOpen}
    />;
  }
  if (screen === "player" && activeCourse) {
    return <CoursePlayer
      course={activeCourse}
      onBack={() => navigate("dashboard")}
      onOpenQuiz={() => setScreen("quiz")}
    />;
  }
  if (screen === "quiz") {
    return <QuizScreen onExit={() => setScreen("player")} />;
  }

  return (
    <div className="app">
      <Sidebar current={screen} onNavigate={navigate} />
      <main style={{ minWidth: 0, display: "flex", flexDirection: "column" }}>
        <Topbar
          onNavigate={navigate}
          currentScreen={screen}
          onLogout={() => setAuthed(false)}
          notifications={notifications}
          setNotifications={setNotifications}
        />
        <div style={{ flex: 1 }}>
          {screen === "dashboard" && <DashboardScreen courses={COURSES} onOpenCourse={openCourse} onNavigate={navigate} />}
          {screen === "browse" && <BrowseScreen courses={COURSES} onOpenCourse={openCourse} />}
          {screen === "my-courses" && <MyCoursesScreen courses={COURSES} onOpenCourse={openCourse} />}
          {screen === "chat" && <ChatScreen courses={COURSES} />}
          {screen === "settings" && <SettingsScreen />}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
